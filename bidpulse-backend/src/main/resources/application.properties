spring.application.name=bidpulse-backend
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bidpulse}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bidpulse}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bidpulse}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# JWT (dev keys — rotate for prod)
